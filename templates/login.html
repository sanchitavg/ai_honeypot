<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{ portal_name }} — Secure Login</title>
    <style>
        /* ── Reset & base ───────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #c9d1d9;
        }

        /* ── Login card ─────────────────────────────────────────────── */
        .login-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* ── Logo / header area ─────────────────────────────────────── */
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .company-name {
            font-size: 13px;
            color: #8b949e;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .portal-title {
            font-size: 20px;
            font-weight: 600;
            color: #e6edf3;
        }

        /* ── Divider ────────────────────────────────────────────────── */
        .divider {
            border: none;
            border-top: 1px solid #30363d;
            margin: 20px 0;
        }

        /* ── Form fields ────────────────────────────────────────────── */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #1f6feb;
        }

        /* ── Login button ───────────────────────────────────────────── */
        .btn-login {
            width: 100%;
            padding: 11px;
            background-color: #1f6feb;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 6px;
        }

        .btn-login:hover {
            background-color: #388bfd;
        }

        /* ── Error message ──────────────────────────────────────────── */
        .error-msg {
            background-color: #3d1f1f;
            border: 1px solid #f85149;
            color: #f85149;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            display: {{ 'block' if error else 'none' }};
        }

        /* ── Footer ─────────────────────────────────────────────────── */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #484f58;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            font-size: 11px;
            color: #3fb950;
        }
    </style>
</head>
<body>

<div class="login-card">

    <!-- Header -->
    <div class="logo-area">
        <div class="logo-icon">🔒</div>
        <div class="company-name">SupplyChain Corp — Internal Systems</div>
        <div class="portal-title">{{ portal_name }}</div>
    </div>

    <hr class="divider"/>

    <!-- Error message (shown only on failed login) -->
    <div class="error-msg">
        ⚠️ {{ error }}
    </div>

    <!-- Login form -->
    <form method="POST" action="/login">

        <div class="form-group">
            <label for="username">Employee ID / Username</label>
            <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your employee ID"
                autocomplete="off"
                required
            />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
            />
        </div>

        <button type="submit" class="btn-login">
            Sign In →
        </button>

    </form>

    <!-- Footer -->
    <div class="footer">
        <div>Authorised access only. All sessions are monitored and recorded.</div>
        <div class="security-badge">
            🛡️ SSL Secured &nbsp;|&nbsp; ISO 27001 Certified
        </div>
    </div>

</div>

</body>
</html>
